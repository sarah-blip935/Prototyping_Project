<!DOCTYPE html>
<html>
<head>
    <title>WebGL Demo - 3D Rotating Cube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            flex-direction: column;
            font-family: Arial;
        }
        h1 { color: #00ff88; margin-bottom: 15px; font-size: 22px; text-align: center; }
        p { color: #ffffff; margin-top: 15px; font-size: 14px; }
        #info { color: #00d4ff; margin-top: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>🎮 WebGL Demo - Rotating 3D Cube</h1>
    <canvas id="canvas" width="500" height="400"></canvas>
    


<script>
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', {antialias: true});

gl.clearColor(0.05, 0.05, 0.15, 1.0);
gl.enable(gl.DEPTH_TEST);
gl.depthFunc(gl.LEQUAL);

// Simple vertex shader
const vsCode = [
'attribute vec3 aPos;',
'attribute vec3 aColor;',
'uniform mat4 uMVP;',
'varying vec3 vColor;',
'void main(void) {',
'  gl_Position = uMVP * vec4(aPos, 1.0);',
'  vColor = aColor;',
'}'
].join('\n');

// Simple fragment shader  
const fsCode = [
'precision mediump float;',
'varying vec3 vColor;',
'void main(void) {',
'  gl_FragColor = vec4(vColor, 1.0);',
'}'
].join('\n');

// Compile shaders
const vs = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vs, vsCode);
gl.compileShader(vs);

const fs = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fs, fsCode);
gl.compileShader(fs);

const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

// Cube: 6 faces, each face = 2 triangles = 6 vertices
// Each vertex: x,y,z, r,g,b
const data = new Float32Array([
  // Front face - RED
  -1,-1, 1,  1,0.2,0.2,
   1,-1, 1,  1,0.2,0.2,
   1, 1, 1,  1,0.2,0.2,
  -1,-1, 1,  1,0.2,0.2,
   1, 1, 1,  1,0.2,0.2,
  -1, 1, 1,  1,0.2,0.2,
  // Back face - GREEN
  -1,-1,-1,  0.2,1,0.2,
   1, 1,-1,  0.2,1,0.2,
   1,-1,-1,  0.2,1,0.2,
  -1,-1,-1,  0.2,1,0.2,
  -1, 1,-1,  0.2,1,0.2,
   1, 1,-1,  0.2,1,0.2,
  // Top face - BLUE
  -1, 1,-1,  0.2,0.4,1,
  -1, 1, 1,  0.2,0.4,1,
   1, 1, 1,  0.2,0.4,1,
  -1, 1,-1,  0.2,0.4,1,
   1, 1, 1,  0.2,0.4,1,
   1, 1,-1,  0.2,0.4,1,
  // Bottom face - YELLOW
  -1,-1,-1,  1,1,0.2,
   1,-1, 1,  1,1,0.2,
  -1,-1, 1,  1,1,0.2,
  -1,-1,-1,  1,1,0.2,
   1,-1,-1,  1,1,0.2,
   1,-1, 1,  1,1,0.2,
  // Right face - MAGENTA
   1,-1,-1,  1,0.2,1,
   1, 1, 1,  1,0.2,1,
   1,-1, 1,  1,0.2,1,
   1,-1,-1,  1,0.2,1,
   1, 1,-1,  1,0.2,1,
   1, 1, 1,  1,0.2,1,
  // Left face - CYAN
  -1,-1,-1,  0.2,1,1,
  -1,-1, 1,  0.2,1,1,
  -1, 1, 1,  0.2,1,1,
  -1,-1,-1,  0.2,1,1,
  -1, 1, 1,  0.2,1,1,
  -1, 1,-1,  0.2,1,1,
]);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);

const stride = 6 * 4;
const posLoc = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, stride, 0);

const colLoc = gl.getAttribLocation(prog, 'aColor');
gl.enableVertexAttribArray(colLoc);
gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, stride, 3*4);

const mvpLoc = gl.getUniformLocation(prog, 'uMVP');

// Matrix math
function mulMat(a, b) {
    var r = new Float32Array(16);
    for(var i=0;i<4;i++)
        for(var j=0;j<4;j++)
            for(var k=0;k<4;k++)
                r[j*4+i] += a[k*4+i]*b[j*4+k];
    return r;
}

function perspective(fov, asp, n, f) {
    var t = Math.tan(fov*Math.PI/360);
    var r = new Float32Array(16);
    r[0]=1/(asp*t); r[5]=1/t;
    r[10]=(f+n)/(n-f); r[11]=-1;
    r[14]=(2*f*n)/(n-f);
    return r;
}

function rotY(a) {
    var c=Math.cos(a), s=Math.sin(a);
    return new Float32Array([c,0,-s,0, 0,1,0,0, s,0,c,0, 0,0,0,1]);
}

function rotX(a) {
    var c=Math.cos(a), s=Math.sin(a);
    return new Float32Array([1,0,0,0, 0,c,s,0, 0,-s,c,0, 0,0,0,1]);
}

function transl(x,y,z) {
    var m = new Float32Array(16);
    m[0]=1; m[5]=1; m[10]=1; m[15]=1;
    m[12]=x; m[13]=y; m[14]=z;
    return m;
}

var angle = 0;
function render() {
    angle += 0.01;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    var proj  = perspective(60, canvas.width/canvas.height, 0.1, 100);
    var trans = transl(0, 0, -5);
    var rotYM = rotY(angle);
    var rotXM = rotX(angle * 0.4);
    var model = mulMat(rotYM, rotXM);
    var mv    = mulMat(trans, model);
    var mvp   = mulMat(proj, mv);

    gl.uniformMatrix4fv(mvpLoc, false, mvp);
    gl.drawArrays(gl.TRIANGLES, 0, 36);
    requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
